name: melpazoid

on:
  push:
  pull_request:

jobs:
  melpazoid:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '27.1'
          - '29.4'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Emacs ${{ matrix.emacs_version }}
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run melpazoid
        env:
          LOCAL_REPO: ${{ github.workspace }}
          # RECIPE is the package recipe as it will appear on MELPA.
          RECIPE: (discourse :repo "glenneth1/discourse.el" :fetcher github)
          # Set EXIST_OK to true once the package is published on MELPA.
          EXIST_OK: 'false'
        run: |
          python -m pip install --upgrade pip
          git clone https://github.com/glenneth1/melpazoid.git ~/melpazoid
          pip install ~/melpazoid
          make -C ~/melpazoid
